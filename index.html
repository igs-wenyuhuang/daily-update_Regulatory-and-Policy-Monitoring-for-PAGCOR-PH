.kw-add{display:inline-flex;align-items:center;gap:4px;background:transparent;border:1px dashed var(--border-strong);color:var(--text-2);font-size:12px;padding:3px 10px;border-radius:999px;cursor:pointer}
.kw-add:hover{border-color:var(--accent);color:var(--accent)}
.filters{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:10px 0 18px;padding:12px 14px;background:var(--surface-2);border-radius:10px}

.cat-btn.active{background:var(--surface);color:var(--text);border-color:var(--border-strong);font-weight:500}

.check input{margin:0;accent-color:var(--accent)}
.sep{width:1px;height:16px;background:var(--border-strong)}

.empty{padding:40px 20px;text-align:center;color:var(--text-3);font-size:13px}

.b-red{background:var(--red-soft);color:var(--red)}
.b-amber{background:var(--amber-soft);color:var(--amber)}
.b-green{background:var(--green-soft);color:var(--green)}
.b-gray{background:var(--gray-soft);color:var(--gray)}
.b-blue{background:var(--accent-soft);color:var(--accent)}
.b-teal{background:var(--teal-soft);color:var(--teal)}
.b-purple{background:var(--purple-soft);color:var(--purple)}
.b-pink{background:var(--pink-soft);color:var(--pink)}
.badge svg{width:11px;height:11px;flex-shrink:0}
.title-zh{font-size:15.5px;font-weight:600;color:var(--text);margin:0 0 3px;line-height:1.45}
.title-en{font-size:12.5px;color:var(--text-3);margin:0 0 12px;line-height:1.45}

.meta-cell{background:var(--surface-2);padding:9px 12px;border-radius:8px}
.meta-cell .k{font-size:10.5px;color:var(--text-3);margin-bottom:2px}
.meta-cell .v{font-size:12.5px;color:var(--text);font-weight:500;line-height:1.4}
.summary{font-size:13.5px;color:var(--text);margin:0 0 4px;line-height:1.65}

mark{background:#FFE9A8;color:var(--text);padding:0 2px;border-radius:2px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:99;padding:20px}
.modal.show{display:flex}
.modal-content{background:var(--surface);border-radius:12px;padding:24px;max-width:480px;width:100%}
.modal-content h3{margin:0 0 8px;font-size:16px}
.modal-content p{margin:0 0 14px;font-size:13.5px;color:var(--text-2);line-height:1.65}

@media(max-width:680px){
  .app{padding:16px}
  header.top{flex-direction:column}
  .meta-grid{grid-template-columns:1fr}

</style>
</head>

  {group:"牌照與框架",items:[
    {title_zh:"PIGO Framework（菲律賓本地線上博彩牌照）",title_en:"PIGO / DEGL Framework",effective_date:"2022 起持續",areas:["licensing"]},
    {title_zh:"B2B Accreditation Framework",title_en:"Mandatory Accreditation for Affiliates & SSPs",effective_date:"2026-01-01",areas:["licensing","advertising"]}
  ]},
  {group:"稅費與規費",items:[
    {title_zh:"GSA 最低保證費 MGF（首階段）",title_en:"Minimum Guaranteed Fee for Gaming System Administrators",effective_date:"2026-06-01（即將生效 D-5）",cited_card:"20260326-001",areas:["taxation","licensing"]}
  ]},
  {group:"廣告與行銷",items:[
    {title_zh:"PAGCOR Cashback / Rebate 上限",title_en:"E-Gaming Cashback & Rebate Caps",effective_date:"2026-05-07",cited_card:"20260507-001",areas:["advertising","taxation"]},

  ]},

    {title_zh:"RA 12312 全面禁止離岸博彩",title_en:"Republic Act 12312 Offshore Gaming Ban",effective_date:"2024-12-31",cited_card:"20260503-001",areas:["enforcement"]}
  ]}

const TODAY = "2026-05-28";
const CURRENT_MONTH = "2026-05";

const CAT_LABEL = {all:"全部",policy:"政策法規",compliance_list:"合規名單",enforcement:"執法動態",signal:"政府風聲"};
const CAT_BADGE = {policy:"b-blue",compliance_list:"b-teal",enforcement:"b-pink",signal:"b-gray"};
const CONFIDENCE_LABEL = {official:"🟢 官方",mainstream_media:"🔵 主流媒體",industry_media:"🟣 產業媒體",industry_signal:"🟠 業界風聲"};
const URGENCY_LABEL = {in_force_new:"已生效",effective_soon:"即將生效",effective_later:"未來生效",draft:"草案",historical:"歷史"};
const AREA_LABEL = {licensing:"牌照",taxation:"稅務",aml:"AML",kyc:"KYC",advertising:"廣告",payments:"支付",foreign_workers:"外籍勞工",data_privacy:"資料隱私",cross_border:"跨境",enforcement:"執法",corporate_structure:"公司架構"};

let state = {
  tab:"today",
  category:"all",
  month:CURRENT_MONTH,
  highOnly:false,
  soonOnly:false,
  showUnverified:false,
  searchQuery:"",
  keywords:[...KEYWORDS_DEFAULT],
  expanded:new Set()
};

function allCards(){
  let out=[];
  Object.values(DATA).forEach(arr=>out.push(...arr));
  return out;
}
function cardsForMonth(m){return DATA[m]||[]}
function cardsToday(){return allCards().filter(c=>c.date_added===TODAY)}

function scoreCard(c){
  let s=c.heat_score||50;
  if(state.keywords.length){
    const hits=(c.keywords_hit||[]).filter(k=>state.keywords.some(uk=>uk.toLowerCase()===k.toLowerCase())).length;
    if(hits>=2)s*=1.2;else if(hits===1)s*=1.1;
  }
  return s;
}
function sortCards(arr){return arr.slice().sort((a,b)=>scoreCard(b)-scoreCard(a))}

function filterCards(arr){
  return arr.filter(c=>{
    if(state.category!=="all"&&c.category!==state.category)return false;
    if(state.highOnly&&c.impact_level!=="high")return false;
    if(state.soonOnly&&!(c.urgency==="effective_soon"||c.urgency==="in_force_new"))return false;
    if(c.category==="signal"&&!state.showUnverified)return false;
    return true;
  });
}

function badgeHTML(b,daysText){
  const map={
    high_impact:["b-red","🔴 高影響"],
    medium_impact:["b-amber","🟡 中影響"],
    low_impact:["b-gray","⚪ 低影響"],
    effective_soon:["b-amber",`🟠 即將生效${daysText?" "+daysText:""}`],
    in_force:["b-green","🟢 已生效"],
    draft:["b-amber","🟡 草案"],
    revoked:["b-gray","⚫ 廢止"],
    enforcement:["b-pink","⚖️ 執法"],
    unverified:["b-gray","🌬️ 未證實"]
  };
  const [cls,label]=map[b]||["b-gray",b];
  return `<span class="badge ${cls}">${label}</span>`;
}

function highlightKW(text){
  if(!text)return"";
  let out=escapeHtml(text);
  state.keywords.forEach(kw=>{
    if(!kw)return;
    const re=new RegExp("("+kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    out=out.replace(re,"<mark>$1</mark>");
  });
  return out;
}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function renderCard(c){
  const isExpanded=state.expanded.has(c.id);
  const isSignal=c.category==="signal";
  const daysText=c.days_to_effective!=null&&c.days_to_effective>0?`D-${c.days_to_effective}`:"";

  const badges=[];
  c.badges.forEach(b=>badges.push(badgeHTML(b,daysText)));
  badges.push(`<span class="badge ${CAT_BADGE[c.category]||"b-gray"}">${CAT_LABEL[c.category]||c.category}</span>`);
  badges.push(`<span class="badge ${c.confidence==="official"?"b-green":c.confidence==="mainstream_media"?"b-blue":c.confidence==="industry_media"?"b-purple":"b-amber"}">${CONFIDENCE_LABEL[c.confidence]||c.confidence}</span>`);

  const areas=(c.impact_areas||[]).map(a=>AREA_LABEL[a]||a).join(" · ");

  let html=`<article class="card ${isSignal?"signal":""}" data-id="${c.id}">`;
  html+=`<div class="badges">${badges.join("")}</div>`;
  html+=`<h2 class="title-zh">${highlightKW(c.title_zh)}</h2>`;
  html+=`<p class="title-en">${escapeHtml(c.title_en)} · ${escapeHtml(c.doc_number)}</p>`;
  html+=`<div class="meta-grid">
    <div class="meta-cell"><div class="k">發布機關</div><div class="v">${escapeHtml(c.issuing_authority)}</div></div>
    <div class="meta-cell"><div class="k">${c.effective_date?"生效日":"狀態"}</div><div class="v">${c.effective_date||"草案中"}</div></div>
    <div class="meta-cell"><div class="k">影響領域</div><div class="v">${escapeHtml(areas)}</div></div>
  </div>`;
  html+=`<p class="summary">${highlightKW(c.summary)}</p>`;
  html+=`<button class="expand-link" data-action="toggle" data-id="${c.id}">${isExpanded?"▴ 收合":"▸ 展開完整內容"}</button>`;

  if(isExpanded){
    html+=`<div class="detail">`;
    html+=`<div class="detail-section"><div class="ds-label">關鍵變更</div><div class="ds-body"><ul>${c.key_changes.map(k=>`<li>${highlightKW(k)}</li>`).join("")}</ul></div></div>`;
    html+=`<div class="detail-section"><div class="ds-label">業務影響</div><div class="ds-body">${highlightKW(c.impact)}</div></div>`;
    html+=`<div class="detail-section"><div class="ds-label">建議行動</div><div class="ds-body">${highlightKW(c.suggested_action)}</div></div>`;
    if(c.original_quote){
      html+=`<div class="detail-section"><div class="ds-label">原文引用</div><div class="quote">"${escapeHtml(c.original_quote.text)}"<div class="cite">— ${escapeHtml(c.original_quote.section)}</div></div></div>`;
    }
    html+=`<div class="detail-section"><div class="ds-label">來源連結</div><div class="sources">${c.sources.map(s=>`<a class="source-link" href="${s.url}" target="_blank" rel="noopener">${escapeHtml(s.name)}<span class="source-type">${s.type}</span> ↗</a>`).join("")}</div></div>`;
    html+=`<div class="detail-actions">
      <button class="btn" data-action="copy" data-id="${c.id}">📋 複製全文</button>
      <button class="btn" data-action="toggle" data-id="${c.id}">▴ 收合</button>
    </div>`;
    html+=`</div>`;
  }
  html+=`<div class="card-footer"><span>捕獲 ${c.date_added}</span><span>ID: ${c.id}</span></div>`;
  html+=`</article>`;
  return html;
}

function renderCards(arr){
  const main=document.getElementById("cards");
  if(!arr.length){
    main.innerHTML=`<div class="empty">本區塊目前無內容。<br><small>（若您勾選了「僅高影響」「僅即將生效」可試著取消篩選；風聲類預設隱藏，需勾選「含未證實風聲」才顯示）</small></div>`;
    return;
  }
  main.innerHTML=arr.map(renderCard).join("");
}

function renderTodayTab(){
  document.getElementById("filters-section").style.display="flex";
  document.getElementById("kw-section").style.display="flex";
  document.getElementById("month-selector-wrap").innerHTML="";
  document.getElementById("search-wrap").innerHTML="";
  document.getElementById("history-banner-wrap").innerHTML="";
  const todayAll=cardsToday();
  let arr=filterCards(todayAll);
  arr=sortCards(arr);
  if(!arr.length&&!todayAll.length){
    document.getElementById("cards").innerHTML=`<div class="empty" style="padding:60px 20px"><div style="font-size:32px;margin-bottom:12px">📭</div><div style="font-size:14px;color:var(--text-2);margin-bottom:6px">今日尚無新增公告</div><div style="font-size:12px;color:var(--text-3);line-height:1.7">工具每日 09:00 PHT 自動掃描 PAGCOR 與相關主管機關。<br>若需手動觸發更新，請點右上「🔄 重整」。<br>本月已累計 ${cardsForMonth(CURRENT_MONTH).length} 條，可切換「月度檢視」查看。</div></div>`;
    return;
  }
  renderCards(arr);
}

function renderMonthlyTab(){
  document.getElementById("filters-section").style.display="flex";
  document.getElementById("kw-section").style.display="flex";
  const months=Object.keys(DATA).sort().reverse();
  const sel=`<div class="month-selector"><span style="font-size:13px;color:var(--text-2)">月份：</span><select id="month-sel">${months.map(m=>`<option value="${m}" ${m===state.month?"selected":""}>${m}</option>`).join("")}</select></div>`;
  document.getElementById("month-selector-wrap").innerHTML=sel;
  document.getElementById("search-wrap").innerHTML="";
  document.getElementById("history-banner-wrap").innerHTML=state.month!==CURRENT_MONTH?`<div class="history-banner">⏳ 您正在檢視歷史月份（${state.month}），重整功能已暫停</div>`:"";
  document.getElementById("refresh-btn").disabled=state.month!==CURRENT_MONTH;
  document.getElementById("month-sel").addEventListener("change",e=>{state.month=e.target.value;render()});
  let arr=filterCards(cardsForMonth(state.month));
  arr=sortCards(arr);
  renderCards(arr);
}

function renderSearchTab(){
  document.getElementById("filters-section").style.display="flex";
  document.getElementById("kw-section").style.display="flex";
  document.getElementById("month-selector-wrap").innerHTML="";
  document.getElementById("history-banner-wrap").innerHTML="";
  document.getElementById("refresh-btn").disabled=false;
  document.getElementById("search-wrap").innerHTML=`<div class="search-bar"><input id="search-input" type="search" placeholder="搜尋標題、機關、文件編號、條文⋯" value="${escapeHtml(state.searchQuery)}"></div>`;
  const inp=document.getElementById("search-input");
  inp.addEventListener("input",e=>{state.searchQuery=e.target.value;renderSearchResults()});
  inp.focus();
  renderSearchResults();
}
function renderSearchResults(){
  if(!state.searchQuery.trim()){
    document.getElementById("cards").innerHTML=`<div class="empty">輸入關鍵字搜尋所有歷史卡片（標題、機關、文件編號、原文引用、摘要）</div>`;
    return;
  }
  const q=state.searchQuery.toLowerCase();
  let arr=allCards().filter(c=>{
    const blob=[c.title_zh,c.title_en,c.doc_number,c.issuing_authority,c.summary,c.impact,(c.original_quote&&c.original_quote.text)||"",...(c.key_changes||[])].join(" ").toLowerCase();
    return blob.includes(q);
  });
  arr=filterCards(arr);
  arr=sortCards(arr);
  renderCards(arr);
}

function renderIndexTab(){
  document.getElementById("filters-section").style.display="none";
  document.getElementById("kw-section").style.display="none";
  document.getElementById("month-selector-wrap").innerHTML="";
  document.getElementById("search-wrap").innerHTML="";
  document.getElementById("history-banner-wrap").innerHTML="";
  document.getElementById("refresh-btn").disabled=false;
  const main=document.getElementById("cards");
  let html="";
  ACTIVE_LAWS.forEach(g=>{
    html+=`<div class="index-group"><h3>${g.group}</h3><div class="index-list">`;
    g.items.forEach(it=>{
      html+=`<div class="index-item" ${it.cited_card?`data-jump="${it.cited_card}"`:""}><div><div class="il-title">${escapeHtml(it.title_zh)}</div><div class="il-sub">${escapeHtml(it.title_en)} · ${it.areas.map(a=>AREA_LABEL[a]||a).join(" · ")}</div></div><div class="il-date">${escapeHtml(it.effective_date)}</div></div>`;
    });
    html+=`</div></div>`;
  });
  main.innerHTML=html;
  main.querySelectorAll("[data-jump]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.jump;
      state.tab="monthly";
      const m=id.slice(0,4)+"-"+id.slice(4,6);
      state.month=m;
      state.expanded.add(id);
      render();
      setTimeout(()=>{const c=document.querySelector(`.card[data-id="${id}"]`);if(c)c.scrollIntoView({behavior:"smooth",block:"start"})},100);
    });
  });
}

function renderKeywords(){
  const list=document.getElementById("kw-list");
  list.innerHTML=state.keywords.map(k=>`<span class="kw-chip">${escapeHtml(k)}<span class="x" data-kw="${escapeHtml(k)}">×</span></span>`).join(" ");
  list.querySelectorAll(".x").forEach(x=>{
    x.addEventListener("click",()=>{
      state.keywords=state.keywords.filter(kw=>kw!==x.dataset.kw);
      renderKeywords();render();
    });
  });
}

function updateHeaderMeta(){
  const today=cardsToday().length;
  const month=cardsForMonth(CURRENT_MONTH).length;
  document.getElementById("header-meta").innerHTML=`${TODAY}<span class="dot"></span>今日新增 ${today} 條<span class="dot"></span>本月累計 ${month} 條`;
}

function render(){
  document.querySelectorAll("nav.tabs .tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===state.tab));
  document.querySelectorAll(".cat-btn").forEach(t=>t.classList.toggle("active",t.dataset.cat===state.category));
  if(state.tab==="today")renderTodayTab();
  else if(state.tab==="monthly")renderMonthlyTab();
  else if(state.tab==="search")renderSearchTab();
  else if(state.tab==="index")renderIndexTab();
}

document.addEventListener("click",e=>{
  const t=e.target.closest("[data-action]");
  if(t){
    if(t.dataset.action==="toggle"){
      const id=t.dataset.id;
      if(state.expanded.has(id))state.expanded.delete(id);
      else state.expanded.add(id);
      render();
    }else if(t.dataset.action==="copy"){
      const id=t.dataset.id;
      const c=allCards().find(x=>x.id===id);
      if(!c)return;
      const text=`${c.title_zh}\n${c.title_en}\n${c.doc_number}\n\n[摘要] ${c.summary}\n\n[關鍵變更]\n- ${c.key_changes.join("\n- ")}\n\n[業務影響]\n${c.impact}\n\n[建議行動]\n${c.suggested_action}\n\n${c.original_quote?"[原文引用]\n"+c.original_quote.text+"\n— "+c.original_quote.section+"\n\n":""}[來源]\n${c.sources.map(s=>s.name+" · "+s.url).join("\n")}`;
      navigator.clipboard.writeText(text).then(()=>showToast("已複製整張卡片內容到剪貼簿"));
    }
  }
});

document.querySelectorAll("nav.tabs .tab").forEach(t=>{
  t.addEventListener("click",()=>{state.tab=t.dataset.tab;render()});
});
document.querySelectorAll(".cat-btn").forEach(t=>{
  t.addEventListener("click",()=>{state.category=t.dataset.cat;render()});
});
document.getElementById("f-high").addEventListener("change",e=>{state.highOnly=e.target.checked;render()});
document.getElementById("f-soon").addEventListener("change",e=>{state.soonOnly=e.target.checked;render()});
document.getElementById("f-unverified").addEventListener("change",e=>{state.showUnverified=e.target.checked;render()});
document.getElementById("kw-add-btn").addEventListener("click",()=>{
  const v=prompt("新增關鍵字（命中時提高排序）：");
  if(v&&v.trim()){state.keywords.push(v.trim());renderKeywords();render()}
});
document.getElementById("refresh-btn").addEventListener("click",()=>{
  document.getElementById("refresh-modal").classList.add("show");
});

function closeModal(){document.getElementById("refresh-modal").classList.remove("show")}
function copyCmd(){
  navigator.clipboard.writeText(document.getElementById("refresh-cmd").textContent).then(()=>{
    showToast("已複製指令，請貼到 Cowork 對話");
    closeModal();
  });
}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

updateHeaderMeta();
renderKeywords();
render();
</script>
</body>
</html>
